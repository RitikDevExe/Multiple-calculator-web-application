<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Multi Calculators</title>
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>
<body>
  <div class="container">

    <!-- Simple Interest Calculator -->
    <div class="card">
      <h2>Simple Interest Calculator</h2>
      <label>Principal (₹)</label>
      <input type="number" id="principal" />

      <label>Rate (%)</label>
      <input type="number" id="rate" />

      <label>Time (years)</label>
      <input type="number" id="time" />

      <button onclick="calculateSI()">Calculate</button>
      <div class="output" id="siOutput"></div>
    </div>

    <!-- BMI Calculator -->
    <div class="card">
      <h2>BMI Calculator</h2>
      <label>Height (cm)</label>
      <input type="number" id="height" />

      <label>Weight (kg)</label>
      <input type="number" id="weight" />

      <button onclick="calculateBMI()">Calculate</button>
      <div class="output" id="bmiOutput"></div>
    </div>

    <!-- Calorie Calculator -->
    <div class="card">
      <h2>Daily Calorie Calculator</h2>

      <label>Age</label>
      <input type="number" id="age" />

      <label>Gender</label>
      <select id="gender">
        <option value="male">Male</option>
        <option value="female">Female</option>
      </select>

      <label>Weight (kg)</label>
      <input type="number" id="calWeight" />

      <label>Height (cm)</label>
      <input type="number" id="calHeight" />

      <label>Activity Level</label>
      <select id="activity">
        <option value="1.2">Sedentary</option>
        <option value="1.375">Lightly Active</option>
        <option value="1.55">Moderately Active</option>
        <option value="1.725">Very Active</option>
        <option value="1.9">Extra Active</option>
      </select>

      <button onclick="calculateCalories()">Calculate</button>
      <div class="output" id="calorieOutput"></div>
    </div>
  </div>
</body>
</html>
